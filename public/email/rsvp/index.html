<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GardenOS</title>
</head>
<body style="margin:0;padding:0;background:#eef2f0;font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#eef2f0;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <table width="1024" cellpadding="0" cellspacing="0" border="0" style="max-width:1024px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <tr>
            <td style="padding:0;background:#ffffff;background-image:url('{{ASSETS_URL}}/image1.png');background-size:cover;background-position:center right;background-repeat:no-repeat;">
              <!--[if gte mso 9]><v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:1024px;height:520px;"><v:fill type="frame" src="{{ASSETS_URL}}/image1.png" color="#ffffff" /><v:textbox inset="0,0,0,0"><![endif]-->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding:28px 24px 26px 56px;">
                    <table width="115px" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="vertical-align:middle;padding-right:8px;">
                          <img src="{{ASSETS_URL}}/image3.png" alt="GardenOS" width="34" height="50" style="display:block;width:34px;height:50px;border:0;" />
                        </td>
                        <td style="vertical-align:middle;">
                          <span style="font-size:17px;line-height:1;font-weight:700;color:#1e293b;">GardenOS</span>
                        </td>
                      </tr>
                    </table>

                    <table width="350px" cellpadding="0" cellspacing="0" border="0" style="margin-top:26px;">
                      <tr>
                        <td>
                          <h1 style="margin:0;font-size:52px;font-weight:700;color:#0c6a34;line-height:1.08;">{{TITLE}}</h1>
                        </td>
                        <td style="vertical-align:bottom;padding-left:8px;padding-bottom:17px;">
                          <img src="{{ASSETS_URL}}/image2.png" alt="" width="30" height="30" style="display:block;width:30px;height:30px;border:0;" />
                        </td>
                      </tr>
                    </table>
                    <div style="margin-top:14px;width:52px;height:4px;background:#0c6a34;border-radius:3px;"></div>

                    <table width="56%" cellpadding="0" cellspacing="0" border="0" style="margin-top:32px;">
                      <tr>
                        <td>
                          {{GREETING_LINE}}
                        </td>
                      </tr>
                      <tr>
                        <td style="padding-top:10px;">
                          <p style="margin:0;font-size:18px;color:#1e293b;line-height:1.55;">{{INTRO}}</p>
                        </td>
                      </tr>
                    </table>

                    <table width="56%" cellpadding="0" cellspacing="0" border="0" style="margin-top:24px;">
                      <tr>
                        <td style="padding-bottom:18px;">
                        </td>
                      </tr>
                      <tr>
                        <td>
                          <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="45" style="vertical-align:top;padding-top:2px;">
                                <img src="{{ASSETS_URL}}/image6.png" alt="" width="32" height="32" style="display:block;width:32px;height:32px;border:0;" />
                              </td>
                              <td style="vertical-align:top;">
                                <p style="margin:0;font-size:16px;color:#475569;line-height:1.6;">{{NOTICE}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding-top:14px;">
                          <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="45" style="vertical-align:top;padding-top:2px;">
                                <img src="{{ASSETS_URL}}/image5.png" alt="" width="32" height="32" style="display:block;width:32px;height:32px;border:0;" />
                              </td>
                              <td style="vertical-align:top;">
                                <p style="margin:0;font-size:16px;color:#475569;line-height:1.6;">{{REPLY}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding-top:14px;">
                          <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="45" style="vertical-align:top;padding-top:2px;">
                                <img src="{{ASSETS_URL}}/image4.png" alt="" width="32" height="32" style="display:block;width:32px;height:32px;border:0;" />
                              </td>
                              <td style="vertical-align:top;">
                                <p style="margin:1px;font-size:16px;color:#475569;line-height:1.6;">{{EXPECT}}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding-top:22px;">
                        </td>
                      </tr>
                      <tr>
                        <td style="padding-top:16px;">
                          <p style="margin:0 0 4px;font-size:15px;font-weight:700;color:#475569;">{{SIGNATURE}}</p>
                          <p style="margin:0;font-size:12px;color:#94a3b8;">mygardenos.com</p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
              <!--[if gte mso 9]></v:textbox></v:rect><![endif]-->
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>
</body>
</html>
